data:
  symbol: BTCUSDT
  timeframe: 1m
  data_dir: /Users/suenot/projects/w_trading/w_trender/backtests/data
  train_months: ["2023-02", "2025-06"]
  val_months: ["2025-07", "2025-10"]
  test_months: ["2025-11", "2026-02"]

tokenizer:
  delta:
    range_pct: 3.0
    step_pct: 0.05
  bucket:
    n_bins: 8

sequence:
  length: 128
  target_horizon: 60
  target_threshold: 0.0015

model:
  delta_vocab_size: 122
  bucket_vocab_size: 10
  delta_emb_dim: 64
  bucket_emb_dim: 16
  hidden_dim: 256
  num_layers: 4
  num_heads: 8
  ffn_dim: 1024
  dropout: 0.1
  num_classes: 3

training:
  batch_size: 64
  grad_accum_steps: 2
  learning_rate: 3.0e-4
  weight_decay: 0.01
  epochs: 10
  early_stop_patience: 3
  device: auto
  seed: 42
  checkpoint_dir: checkpoints
  log_dir: logs

backtest:
  commission: 0.0004
  stop_loss: -0.005
  take_profit: 0.01
  max_hold: 60
